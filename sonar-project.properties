sonar.organization=massimilianolapuma
sonar.projectKey=massimilianolapuma_cubelite

# ── Source scope ─────────────────────────────────────────────────────
# Exclude test directories and build artifacts from ALL analysis
# (source, issues, AND security hotspots).
sonar.exclusions=**/cubeliteTests/**,**/cubeliteUITests/**,**/tests/**,**/target/**

# Test source identification — intentionally left empty.
# Test dirs are already fully excluded above.  Setting test.inclusions
# for excluded paths can cause SonarCloud to re-scan them for Security
# Hotspots even though they are excluded from source analysis.
# When test coverage is configured, set sonar.test.inclusions back and
# remove the corresponding entries from sonar.exclusions.
# sonar.test.inclusions=**/cubeliteTests/**,**/cubeliteUITests/**,**/tests/**

# ── Security hotspot exclusions ──────────────────────────────────────
# Test files use hardcoded IPs (mock pods), self-signed certs, and
# fixture URIs.  These are NOT production code and carry no risk.
# sonar.issue.ignore.multicriteria does NOT cover Security Hotspots,
# so we must also mark them via NOSONAR in source.  If SonarCloud still
# flags them, mark as "Safe" in the SonarCloud UI:
#   Project → Security Hotspots → select → "Safe"

# ── Issue exclusions (Swift conventions diverge from Sonar way) ──────
sonar.issue.ignore.multicriteria=e1,e2,e3

# swift:S5122 — Test naming: underscores are standard Swift convention
#   (test<Method>_<condition>_<expected> per Apple XCTest / swift-testing)
sonar.issue.ignore.multicriteria.e1.ruleKey=swift:S5122
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*Tests.swift

# swift:S1075 — Hardcoded URIs: fixture paths in tests are expected
sonar.issue.ignore.multicriteria.e2.ruleKey=swift:S1075
sonar.issue.ignore.multicriteria.e2.resourceKey=**/*Tests.swift

# swift:S1313 — Hardcoded IPs: mock pod/service IPs in tests are safe
sonar.issue.ignore.multicriteria.e3.ruleKey=swift:S1313
sonar.issue.ignore.multicriteria.e3.resourceKey=**/*Tests.swift
