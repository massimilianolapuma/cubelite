sonar.organization=massimilianolapuma
sonar.projectKey=massimilianolapuma_cubelite

# Exclude test directories from main source analysis
sonar.exclusions=**/cubeliteTests/**,**/cubeliteUITests/**,**/tests/**

# Test source identification
sonar.test.inclusions=**/cubeliteTests/**,**/cubeliteUITests/**,**/tests/**

# ── Issue exclusions (Swift conventions diverge from Sonar way) ──────
sonar.issue.ignore.multicriteria=e1,e2

# swift:S5122 — Test naming: underscores are standard Swift convention
#   (test<Method>_<condition>_<expected> per Apple XCTest / swift-testing)
sonar.issue.ignore.multicriteria.e1.ruleKey=swift:S5122
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*Tests.swift

# swift:S1075 — Hardcoded URIs: fixture paths in tests are expected
sonar.issue.ignore.multicriteria.e2.ruleKey=swift:S1075
sonar.issue.ignore.multicriteria.e2.resourceKey=**/*Tests.swift
