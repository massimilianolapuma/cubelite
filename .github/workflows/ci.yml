name: CI

on:
  push:
    branches: [main, "feat/**", "fix/**", "chore/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-rust:
    name: Lint Rust
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install system dependencies (Tauri / WebKit)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev libsoup-3.0-dev libayatana-appindicator3-dev
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Check formatting
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

  test-rust:
    name: Test Rust
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint-rust
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install system dependencies (Tauri / WebKit)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev libsoup-3.0-dev libayatana-appindicator3-dev
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Run tests
        run: cargo test --workspace

  lint-fe:
    name: Lint Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Check desktop app exists
        id: check
        run: |
          if [ -f apps/desktop/package.json ]; then
            echo "has_fe=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_fe=false" >> "$GITHUB_OUTPUT"
            echo "Desktop app not present — skipping frontend lint"
          fi
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        if: steps.check.outputs.has_fe == 'true'
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        if: steps.check.outputs.has_fe == 'true'
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        if: steps.check.outputs.has_fe == 'true'
        run: pnpm install --frozen-lockfile
      - name: Lint
        if: steps.check.outputs.has_fe == 'true'
        run: pnpm --filter desktop lint
      - name: Type check
        if: steps.check.outputs.has_fe == 'true'
        run: pnpm --filter desktop check

  test-fe:
    name: Test Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint-fe
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Check desktop app exists
        id: check
        run: |
          if [ -f apps/desktop/package.json ]; then
            echo "has_fe=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_fe=false" >> "$GITHUB_OUTPUT"
            echo "Desktop app not present — skipping frontend tests"
          fi
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        if: steps.check.outputs.has_fe == 'true'
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        if: steps.check.outputs.has_fe == 'true'
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        if: steps.check.outputs.has_fe == 'true'
        run: pnpm install --frozen-lockfile
      - name: Generate SvelteKit files
        if: steps.check.outputs.has_fe == 'true'
        run: pnpm --filter desktop exec svelte-kit sync
      - name: Check for test files
        if: steps.check.outputs.has_fe == 'true'
        id: check_tests
        run: |
          if find apps/desktop/src -name '*.test.*' -o -name '*.spec.*' 2>/dev/null | grep -q .; then
            echo "has_tests=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_tests=false" >> "$GITHUB_OUTPUT"
            echo "No test files found — skipping frontend tests"
          fi
      - name: Unit tests
        if: steps.check.outputs.has_fe == 'true' && steps.check_tests.outputs.has_tests == 'true'
        run: pnpm --filter desktop test
