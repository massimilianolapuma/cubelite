name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "docs/guide/**"
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc

      - name: Render user guide (docs/guide/*.md → site/docs/*.html)
        run: |
          mkdir -p site/docs
          for md in docs/guide/*.md; do
            base="$(basename "$md" .md)"
            out="$base.html"
            if [ "$base" = "README" ]; then out="index.html"; fi
            pandoc "$md" \
              --from gfm --to html5 \
              --template site/doc-template.html \
              --metadata title="$(head -1 "$md" | sed 's/^# //')" \
              --output "site/docs/$out"
          done
          # Rewrite relative .md links to their rendered .html counterparts
          sed -i -E 's/href="([^"#:]+)\.md(#[^"]*)?"/href="\1.html\2"/g' site/docs/*.html
          sed -i 's/href="README.html/href="index.html/g' site/docs/*.html

      - name: Setup Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0

      - name: Upload artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac2b3c603fc # v4.0.5
