on:
    create:
        # si triggera quando viene creato un branch

jobs:
    handle-dependabot-branch:
        if: startsWith(github.ref_name, 'dependabot/')
        runs-on: ubuntu-latest
        timeout-minutes: 15
        permissions:
            contents: read
        steps:
            - name: Create Jira Issue
              id: create
              run: |
                  BODY=$(jq -n \
                    --arg project "$JIRA_PROJECT_KEY" \
                    --arg summary "Security update: ${{ github.ref_name }}" \
                    '{fields:{project:{key:$project},summary:$summary,issuetype:{name:"Task"}}}')
                  RESPONSE=$(curl --fail-with-body -s -X POST \
                    -H "Authorization: Basic $(printf '%s:%s' "$JIRA_USER_EMAIL" "$JIRA_API_TOKEN" | base64 -w0)" \
                    -H "Content-Type: application/json" \
                    -d "$BODY" \
                    "$JIRA_BASE_URL/rest/api/3/issue")
                  ISSUE_KEY=$(echo "$RESPONSE" | jq -r '.key')
                  ISSUE_URL="${JIRA_BASE_URL}/browse/${ISSUE_KEY}"
                  echo "issue=${ISSUE_KEY}" >> "$GITHUB_OUTPUT"
                  echo "issue_url=${ISSUE_URL}" >> "$GITHUB_OUTPUT"
              env:
                  JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
                  JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
                  JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
                  JIRA_PROJECT_KEY: ${{ secrets.JIRA_PROJECT_KEY }}

            - name: Write job summary
              run: |
                  echo "## Jira ticket created" >> "$GITHUB_STEP_SUMMARY"
                  echo "" >> "$GITHUB_STEP_SUMMARY"
                  echo "- **Branch**: \`${{ github.ref_name }}\`" >> "$GITHUB_STEP_SUMMARY"
                  echo "- **Ticket**: [${{ steps.create.outputs.issue }}](${{ steps.create.outputs.issue_url }})" >> "$GITHUB_STEP_SUMMARY"
